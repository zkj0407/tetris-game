name: Build · Push · Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy:
        description: '部署到云服务器'
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # zkj0407/tetris-game

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Job 1: Build multi-arch image (amd64 + arm64) and push to GHCR
  # ──────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Multi-Arch Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────
  # Job 2: Export offline .tar packages for both architectures
  # ──────────────────────────────────────────────────────────────────
  export-offline-images:
    name: Export Offline Image (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: build-and-push

    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build single-arch image for export
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: tetris-game:${{ matrix.arch }}
          cache-from: type=gha

      - name: Export image to tar
        run: |
          docker save tetris-game:${{ matrix.arch }} \
            -o tetris-image-${{ matrix.arch }}.tar
          echo "Exported size: $(du -sh tetris-image-${{ matrix.arch }}.tar | cut -f1)"

      - name: Upload tar as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: tetris-image-${{ matrix.arch }}
          path: tetris-image-${{ matrix.arch }}.tar
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────
  # Job 3: SSH deploy to Tencent Cloud server
  # ──────────────────────────────────────────────────────────────────
  deploy-to-server:
    name: Deploy to Tencent Cloud
    runs-on: ubuntu-latest
    needs: build-and-push
    # Run on push to main, or when manually triggered with deploy=true
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' && inputs.deploy == true))

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            # ── Install Docker if not present ──────────────────────
            if ! command -v docker &>/dev/null; then
              echo "Installing Docker..."
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker $USER
              newgrp docker
            fi

            # ── Install docker-compose plugin if not present ───────
            if ! docker compose version &>/dev/null 2>&1; then
              echo "Installing docker-compose plugin..."
              mkdir -p ~/.docker/cli-plugins
              ARCH=$(uname -m)
              [ "$ARCH" = "x86_64" ] && ARCH="x86_64"
              [ "$ARCH" = "aarch64" ] && ARCH="aarch64"
              curl -SL "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-${ARCH}" \
                -o ~/.docker/cli-plugins/docker-compose
              chmod +x ~/.docker/cli-plugins/docker-compose
            fi

            # ── Ensure app directory exists ────────────────────────
            mkdir -p ~/tetris-game
            cd ~/tetris-game

            # ── Write docker-compose.yml ───────────────────────────
            cat > docker-compose.yml << 'EOF'
            services:
              tetris:
                image: ghcr.io/zkj0407/tetris-game:latest
                container_name: tetris-game
                ports:
                  - "80:80"
                restart: always
                healthcheck:
                  test: ["CMD", "wget", "-qO-", "http://localhost/"]
                  interval: 30s
                  timeout: 5s
                  retries: 3
                  start_period: 10s
            EOF

            # ── Pull latest image and restart container ────────────
            docker pull ghcr.io/zkj0407/tetris-game:latest
            docker compose down --remove-orphans || true
            docker compose up -d

            # ── Clean up old dangling images ───────────────────────
            docker image prune -f

            echo "✅ Tetris game deployed at http://$(curl -s ifconfig.me)"
